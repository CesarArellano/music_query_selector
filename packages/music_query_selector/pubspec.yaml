name: music_query_selector
resolution: workspace
description: Flutter Plugin used to query audios/songs infos [title, artist, album, etc..] from device storage.
version: 3.0.0
homepage: https://github.com/LucJosin/music_query_selector/tree/main/packages/music_query_selector
issue_tracker: https://github.com/LucJosin/music_query_selector/issues
# pub.dev: https://pub.dev/packages/music_query_selector
topics:
  - audio
  - song
  - audioquery
  - storage
  - mediastore

environment:
  sdk: '^3.12.2'
  flutter: ">=3.44.4"

dependencies:
  # music_query_selector
  music_query_selector_platform_interface: ^1.7.0
  music_query_selector_ios: ^1.1.1
  music_query_selector_android: ^1.1.0

  # Flutter
  flutter:
    sdk: flutter

dev_dependencies:
  # Flutter
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# The following section is specific to Flutter.
flutter:
  # Material Design
  uses-material-design: true
  plugin:
    platforms:
      android:
        default_package: music_query_selector_android
      ios:
        default_package: music_query_selector_ios